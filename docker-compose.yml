services:
  postgres:
    image: postgres:16-alpine
    container_name: parceliq-postgres
    environment:
      POSTGRES_USER: parceliq
      POSTGRES_PASSWORD: parceliq
      POSTGRES_DB: parceliq
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U parceliq -d parceliq']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: parceliq-backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://parceliq:parceliq@postgres:5432/parceliq?schema=public
      PORT: '3000'
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      # Nominatim's CDN blocks User-Agents containing "example.com".
      NOMINATIM_USER_AGENT: ParcelIQ-POC/1.0 (local-dev)
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             yarn start:dev"

volumes:
  postgres_data:
